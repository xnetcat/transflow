name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Watches main for Conventional Commits ("feat:", "fix:", "feat!:", ...).
      # When the next release should ship, opens (or updates) a PR that bumps
      # package.json, regenerates CHANGELOG.md, and updates the manifest.
      # Merging that PR creates the matching git tag, which our publish.yml
      # then picks up and publishes to npm via Trusted Publishing.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
