name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing (OIDC). The npm CLI exchanges
      # this short-lived GitHub OIDC token for a one-shot publish credential
      # — no NPM_TOKEN needed.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Node 24 ships npm 11+, which supports Trusted Publishing.
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Publish (with provenance via Trusted Publishing)
        run: npm publish --provenance --access public
